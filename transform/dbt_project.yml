name: pulse
version: '1.0.0'
config-version: 2

profile: pulse

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  pulse:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

seeds:
  pulse:
    orders:
      +schema: raw
      +column_types:
        invoice_no:   varchar
        stock_code:   varchar
        description:  varchar
        quantity:     integer
        invoice_date: timestamp
        unit_price:   double
        customer_id:  varchar
        country:      varchar
        ingested_at:  timestamp
