version: 2

models:
  - name: mart_daily_revenue
    description: "Daily revenue summary, built from governed staging orders. Powers the executive Power BI report."
    columns:
      - name: revenue_date
        description: "Calendar date (UTC)"
        tests:
          - not_null
          - unique

      - name: order_count
        description: "Distinct invoices on this date"
        tests:
          - not_null

      - name: unique_customers
        description: "Distinct customers on this date"
        tests:
          - not_null

      - name: total_revenue_gbp
        description: "Sum of line totals in GBP"
        tests:
          - not_null

      - name: avg_order_value_gbp
        description: "Mean line total across all orders on this date"
        tests:
          - not_null
